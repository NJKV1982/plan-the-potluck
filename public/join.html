<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Invited – Plan The Potluck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .join-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 60px;
    }
    .join-hero {
      width: 100%;
      background: linear-gradient(135deg, var(--green-dark) 0%, #1e5c3a 60%, #52b788 100%);
      text-align: center;
      padding: 48px 20px 56px;
      color: #fff;
    }
    .join-hero .invite-tag {
      display: inline-block;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 99px;
      padding: 5px 16px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .join-hero h1 { color: #fff; font-size: clamp(1.6rem, 5vw, 2.4rem); margin-bottom: 20px; }
    .join-meta {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 12px; font-size: .9rem; color: rgba(255,255,255,.88);
    }
    .join-meta-item { display: flex; align-items: center; gap: 6px; }

    .join-card {
      width: 100%; max-width: 480px;
      margin: -28px auto 0;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,.12);
      padding: 32px 28px;
    }
    .join-card h2 { font-size: 1.2rem; margin-bottom: 6px; }
    .join-card p  { font-size: .875rem; color: var(--text-mid); margin-bottom: 24px; }

    .join-form { display: flex; flex-direction: column; gap: 16px; }
    .join-form label { font-size: .85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; display: block; }
    .join-form input {
      width: 100%; height: 48px; padding: 0 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 1rem; font-family: inherit;
      box-sizing: border-box;
      transition: border-color .15s;
    }
    .join-form input:focus { outline: none; border-color: var(--green-mid); }

    .join-hint {
      font-size: .78rem; color: var(--text-light); margin-top: 4px;
    }

    .btn-join {
      width: 100%; height: 52px; font-size: 1.05rem; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      background: var(--green-dark); color: #fff;
      transition: background .15s, transform .1s;
      margin-top: 4px;
    }
    .btn-join:hover { background: #1e5c3a; transform: translateY(-1px); }
    .btn-join:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .divider { text-align: center; color: var(--text-light); font-size: .8rem; margin: 16px 0; position: relative; }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 40%;
      height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .returning-section { margin-top: 4px; }
    .returning-section p { font-size: .825rem; color: var(--text-mid); text-align: center; margin-bottom: 10px; }
    .btn-returning {
      width: 100%; height: 44px; font-size: .9rem; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer;
      background: #fff; color: var(--text-dark);
      transition: border-color .15s;
    }
    .btn-returning:hover { border-color: var(--green-mid); color: var(--green-dark); }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span>🍽️</span> Plan The Potluck</a>
    </div>
  </nav>

  <main class="join-page">
    <div class="join-hero" id="joinHero">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>

    <div class="join-card" id="joinCard" style="display:none;">
      <h2>👋 Who's joining?</h2>
      <p>Enter your name to RSVP, pick a dish, and set your headcount.</p>

      <div class="join-form" id="joinForm">
        <div>
          <label for="nameInput">Your Name <span style="color:var(--orange)">*</span></label>
          <input type="text" id="nameInput" placeholder="e.g. Priya, Marcus, Sarah…" maxlength="60" autocomplete="name" />
        </div>
        <div>
          <label for="phoneInput">Phone Number <span style="color:var(--text-light);font-weight:400">(optional)</span></label>
          <input type="tel" id="phoneInput" placeholder="+1 555 000 0000" autocomplete="tel" />
          <div class="join-hint">Only used for event updates — never shared.</div>
        </div>
        <button class="btn-join" id="joinBtn" onclick="handleJoin()">🎉 Join the Potluck</button>
      </div>

      <div class="divider">or</div>
      <div class="returning-section">
        <p>Already joined from another device?</p>
        <button class="btn-returning" onclick="handleReturning()">🔁 Find my entry by name</button>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>

  <script>
  (() => {
    const $ = id => document.getElementById(id);
    const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function toast(msg, type = 'success') {
      const c = $('toast-container');
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3800);
    }

    function formatDate(d) {
      if (!d) return '';
      try { return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }); }
      catch { return d; }
    }
    function formatTime(t) {
      if (!t) return '';
      try { const [h,m]=t.split(':'); const d=new Date(); d.setHours(+h,+m); return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
      catch { return t; }
    }

    const pathParts = window.location.pathname.split('/');
    const eventId   = pathParts[2] || '';
    const LS_KEY    = `ptluck_token_${eventId}`;

    // Check localStorage for a cached token for this event
    const cachedToken = localStorage.getItem(LS_KEY);
    if (cachedToken) {
      // Auto-redirect to their personal link
      window.location.replace(`/event/${eventId}?g=${cachedToken}`);
    }

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed.');
      return data;
    }

    async function loadEvent() {
      if (!eventId) {
        $('joinHero').innerHTML = '<p style="color:#fff;padding:20px;">Event not found.</p>';
        return;
      }
      try {
        const ev = await api('GET', `/api/events/${eventId}`);
        document.title = `${ev.name} – Plan The Potluck`;
        $('joinHero').innerHTML = `
          <div class="invite-tag">🎉 You're Invited!</div>
          <h1>${esc(ev.name)}</h1>
          <div class="join-meta">
            <span class="join-meta-item">📅 ${esc(formatDate(ev.date))}</span>
            <span class="join-meta-item">🕐 ${esc(formatTime(ev.time))}</span>
            <span class="join-meta-item">📍 ${esc(ev.location)}</span>
          </div>
          ${ev.description ? `<p style="margin-top:14px;font-size:.9rem;color:rgba(255,255,255,.8);max-width:500px;margin-left:auto;margin-right:auto;">${esc(ev.description)}</p>` : ''}
        `;
        $('joinCard').style.display = '';
      } catch(e) {
        $('joinHero').innerHTML = `<p style="color:#fff;padding:20px;">${esc(e.message)}</p>`;
      }
    }

    async function handleJoin() {
      const name  = $('nameInput').value.trim();
      const phone = $('phoneInput').value.trim();
      if (!name) { toast('Please enter your name.', 'error'); $('nameInput').focus(); return; }

      const btn = $('joinBtn');
      btn.disabled = true;
      btn.textContent = 'Joining…';

      try {
        const data = await api('POST', `/api/events/${eventId}/join`, { name, phone });
        localStorage.setItem(LS_KEY, data.guest_token);
        window.location.href = `/event/${eventId}?g=${data.guest_token}`;
      } catch(e) {
        toast(e.message, 'error');
        btn.disabled = false;
        btn.textContent = '🎉 Join the Potluck';
      }
    }

    // "Find my entry" — same as join (find-or-create by name)
    function handleReturning() {
      const name = $('nameInput').value.trim();
      if (!name) {
        toast('Enter your name above to find your entry.', 'error');
        $('nameInput').focus();
        return;
      }
      handleJoin();
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleJoin();
    });

    window.handleJoin      = handleJoin;
    window.handleReturning = handleReturning;

    loadEvent();
  })();
  </script>
</body>
</html>
